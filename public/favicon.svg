<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="glassBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>

    <linearGradient id="metalLines" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#64748B" />
    </linearGradient>

    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0)" />
    </radialGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <polygon points="50,4 89.8,27 89.8,73 50,96 10.2,73 10.2,27" 
           fill="url(#glassBg)" 
           stroke="rgba(255, 255, 255, 0.12)" 
           stroke-width="1" />

  <g filter="url(#shadow)">
    <g stroke="url(#metalLines)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
      <path d="M 44.8 85 L 17.1 69 L 17.1 31 L 50 12 L 82.9 31 L 82.9 69 L 55.2 85" opacity="0.8" />
      
      <path d="M 50 93 L 50 22" />

      <path d="M 50 50 L 36 41.9 L 36 30" />
      <path d="M 50 50 L 64 41.9 L 64 30" />

      <path d="M 50 71 L 38 77.9 L 30 73.3" />
      <path d="M 50 71 L 62 77.9 L 70 73.3" />
    </g>

    <g fill="#F8FAFC">
      <circle cx="50" cy="50" r="4.5" />
      <circle cx="50" cy="50" r="8" fill="url(#nodeGlow)" opacity="0.3" />
      
      <circle cx="50" cy="22" r="3" />
      <circle cx="36" cy="30" r="3" />
      <circle cx="64" cy="30" r="3" />
      <circle cx="30" cy="73.3" r="3" />
      <circle cx="70" cy="73.3" r="3" />
    </g>
  </g>
</svg>